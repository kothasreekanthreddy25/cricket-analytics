[build]
builder = "nixpacks"
buildCommand = "npm install && npx prisma generate && npm run build"

[deploy]
startCommand = "npm run start"
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3

[[services]]
name = "cricket-analytics"

[environments.production.variables]
NODE_ENV = "production"
PORT = "3000"

[nixpacks]
providers = ["node"]

[nixpacks.variables]
NODE_VERSION = "22"
